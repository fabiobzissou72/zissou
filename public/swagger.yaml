          content:
            application/json:
              schema:
                type: object
                properties:
                  cliente:
                    type: object
                    properties:
                      telefone:
                        type: string
                      nome:
                        type: string
                  total_agendamentos:
                    type: integer
                  proximo_agendamento:
                    type: object
                  agendamentos_futuros:
                    type: array
                    items:
                      type: object
              example:
                cliente:
                  telefone: "11970307000"
                  nome: "João Silva"
                total_agendamentos: 2
                proximo_agendamento:
                  id: "uuid-123"
                  data: "20/12/2025"
                  hora_inicio: "14:30"
                  barbeiro: "Hiago"
