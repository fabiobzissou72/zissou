      description: |
        Retorna os agendamentos FUTUROS de um cliente pelo telefone.

        **⚠️ IMPORTANTE: Envie o telefone via header OU query parameter**

        **Exemplo com HEADER (recomendado para N8N):**
        ```bash
        curl -X GET 'https://zissou.vercel.app/api/clientes/meus-agendamentos' \
          -H 'Authorization: Bearer SEU_TOKEN' \
          -H 'telefone: 11970307000'
        ```

        **Exemplo com QUERY:**
        ```bash
        curl -X GET 'https://zissou.vercel.app/api/clientes/meus-agendamentos?telefone=11970307000' \
          -H 'Authorization: Bearer SEU_TOKEN'
        ```
      security:
        - BearerAuth: []
      parameters:
        - name: telefone
          in: header
          required: true
          schema:
            type: string
          description: Telefone do cliente (OBRIGATÓRIO - pode ser enviado via header ou query)
