      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - produto_id
              properties:
                produto_id:
                  type: string
                  format: uuid
                nome:
                  type: string
                descricao:
                  type: string
                preco:
                  oneOf:
                    - type: number
                    - type: string
                categoria:
                  type: string
                estoque:
                  oneOf:
                    - type: integer
                    - type: string
                ativo:
                  type: boolean
      responses:
        '200':
          description: Produto atualizado

  # =====================
  # PLANOS
  # =====================

  /planos/listar:
    get:
      tags:
        - Planos
      summary: Listar planos de fidelidade
      description: Retorna todos os planos disponíveis
      security:
        - BearerAuth: []
      parameters:
        - name: ativo
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Lista de planos

  /planos/criar:
    post:
      tags:
        - Planos
      summary: Criar novo plano
      description: |
        Cria um novo plano de fidelidade.

        **Nota:** Todos os valores numéricos aceitam tanto number quanto string
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - nome
                - valor_original
                - valor_total
                - quantidade_servicos
                - validade_dias
              properties:
                nome:
                  type: string
                descricao:
                  type: string
                valor_original:
                  oneOf:
                    - type: number
                    - type: string
                  description: Valor se fosse comprar serviços separados
                valor_total:
                  oneOf:
                    - type: number
                    - type: string
                  description: Valor do plano (com desconto)
                quantidade_servicos:
                  oneOf:
                    - type: integer
                    - type: string
                  description: Quantidade de serviços inclusos
                validade_dias:
                  oneOf:
                    - type: integer
                    - type: string
                  description: Dias de validade do plano
                ativo:
                  type: boolean
                  default: true
      responses:
        '201':
          description: Plano criado

  /planos/atualizar:
    post:
      tags:
        - Planos
      summary: Atualizar plano existente
      description: |
        Atualiza dados de um plano existente.

        **Nota:** Todos os valores numéricos aceitam tanto number quanto string.
        A economia é recalculada automaticamente.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - plano_id
              properties:
                plano_id:
                  type: string
                  format: uuid
                nome:
                  type: string
                descricao:
                  type: string
                valor_original:
                  oneOf:
                    - type: number
                    - type: string
                valor_total:
                  oneOf:
                    - type: number
                    - type: string
                quantidade_servicos:
                  oneOf:
                    - type: integer
                    - type: string
                validade_dias:
                  oneOf:
                    - type: integer
                    - type: string
                ativo:
                  type: boolean
      responses:
        '200':
          description: Plano atualizado

  # =====================
  # CRON E AUTOMAÇÕES
  # =====================

  /cron/lembretes:
    get:
      tags:
        - Cron
      summary: Enviar lembretes automáticos
      description: |
        Endpoint para cron jobs enviarem lembretes automaticamente.

        **Este endpoint requer autenticação especial via header:**
        ```
        Authorization: Bearer CRON_SECRET
        ```

        Onde `CRON_SECRET` é a variável de ambiente configurada no servidor.

        **Responsabilidades:**
        1. Verificar agendamentos que precisam de lembrete 24h antes
        2. Verificar agendamentos que precisam de lembrete 2h antes
        3. Verificar agendamentos para follow-up 3 dias após
        4. Verificar agendamentos para follow-up 21 dias após (reagendar)
        5. Disparar webhooks N8N para cada notificação

        **Configuração do Cron:**
        Configure seu servidor para chamar este endpoint de hora em hora (8h-20h).
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Cron executado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      lembrete_24h:
                        type: integer
                      lembrete_2h:
                        type: integer
                      followup_3d:
                        type: integer
                      followup_21d:
                        type: integer
                      erros:
                        type: array
                        items:
                          type: string
        '401':
          description: Não autorizado

  /lembretes:
    get:
      tags:
        - Cron
      summary: Histórico de lembretes enviados
      description: Consulta lembretes que foram disparados
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Lista de lembretes

  # =====================
  # ADMIN
  # =====================

  /admin/estatisticas:
    get:
      tags:
        - Admin
      summary: Estatísticas gerais do sistema
      description: |
        Retorna estatísticas gerais da barbearia para o período especificado.

        **Períodos disponíveis:**
        - hoje
        - semana
        - mes (padrão)
        - ano
      security:
        - BearerAuth: []
      parameters:
        - name: periodo
          in: query
          schema:
            type: string
            default: mes
            enum: [hoje, semana, mes, ano]
          description: Período das estatísticas
        - name: data_inicio
          in: query
          schema:
            type: string
          description: Data de início customizada (DD-MM-YYYY)
        - name: data_fim
          in: query
          schema:
            type: string
          description: Data fim customizada (DD-MM-YYYY)
      responses:
        '200':
          description: Estatísticas retornadas
          content:
            application/json:
              schema:
                type: object
                properties:
                  total_agendamentos:
                    type: integer
                  total_clientes:
                    type: integer
                  faturamento_mensal:
                    type: number
                  agendamentos_hoje:
                    type: integer

  # =====================
  # SYNC E DEBUG
  # =====================

  /sync/google-calendar:
    post:
      tags:
        - Admin
      summary: Sincronizar com Google Calendar
      description: Sincroniza agendamento com Google Calendar do barbeiro
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                agendamento_id:
                  type: string
                  format: uuid
      responses:
        '200':
          description: Sincronização realizada

  /debug/servicos:
    get:
      tags:
        - Debug
      summary: Debug de serviços
      description: Endpoint de depuração para verificar serviços cadastrados
      responses:
        '200':
          description: Lista de serviços com detalhes de debug
